name: PR Checks

# Run automated checks on every pull request targeting main, BEFORE it merges.
# This does not deploy anything — deployment stays in static.yml (push to main).
on:
  pull_request:
    branches: ["main"]

# If a PR is updated with a new push, cancel the older in-progress run.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

# Read-only: this workflow only inspects code, it never writes to the repo.
permissions:
  contents: read

jobs:
  verify:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
